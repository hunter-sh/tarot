<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Hunter_OS/Trailer</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet" />
</head>
  <style>
    /* === HUNTER_OS Ritual CSS === */
    body {
      background-color: black;
      color: white;
      font-family: 'Fira Code', monospace;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 2rem;
      color: #f5f5f5;
      text-shadow: 0 0 8px #fff;
      animation: glow 2s ease-in-out infinite alternate;
    }

    video {
      width: 80%;
      max-width: 960px;
      margin-bottom: 2rem;
      border: 2px solid #444;
      border-radius: 10px;
      box-shadow: 0 0 12px #222;
    }

    .btn {
      padding: 12px 30px;
      font-size: 1rem;
      color: #00ffcc;
      background-color: transparent;
      border: 2px solid #00ffcc;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: bold;
      text-transform: uppercase;
      box-shadow: 0 0 8px #00ffcc;
    }

    .btn:hover {
      background-color: #00ffcc;
      color: black;
      box-shadow: 0 0 16px #00ffcc;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #fff, 0 0 20px #00ffcc, 0 0 30px #00ffcc;
      }
      to {
        text-shadow: 0 0 20px #fff, 0 0 30px #00ffcc, 0 0 40px #00ffcc;
      }
    }
  </style>
<body>
  <h1>HUNTER_OS/ Trailer</h1>

  <video id="vid" width="80%" controls></video>
  <audio id="aud" src="voice_hunter.mp3"></audio>

  <div>
    <button class="btn" onclick="startRitual()">🜂 PLAY</button>
  </div>

  <script>
    const videos = [
      "1.2.20250309_2238_Grand Central Reunion_simple_compose_01jnydh4p2fsb9g3ffryby7rhr.mp4",
      "20250309_2131_Manhattan's Mystery Unfolds_simple_compose_01jny9njbce76906v4beb2xjpg.mp4",
      "20260124_2303_New Video_simple_compose_01kfs0gbxrfcwv9myarytr7cxw.mp4",
      "20251019_2100_New Video_simple_compose_01k7yxg0g6e7zs8qsv0jy0qhn8.mp4"
    ];

    let index = 0;

    function startRitual() {
      const video = document.getElementById('vid');
      const audio = document.getElementById('aud');

      audio.currentTime = 0;
      audio.play();

      playNextVideo(video);

      video.onended = () => {
        index++;
        if (index < videos.length) {
          playNextVideo(video);
        } else {
          console.log("🜂 Rituel terminé.");
        }
      };
    }

    function playNextVideo(video) {
      video.src = videos[index];
      video.onloadedmetadata = () => {
        // Décale uniquement la dernière vidéo de 3 secondes
        video.currentTime = (index === videos.length - 1) ? 3 : 0;
        video.play();
      };
    }
  </script>
</body>
</html>
